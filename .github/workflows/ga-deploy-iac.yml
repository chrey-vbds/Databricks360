name: Deploy-IAC

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '*'
  pull_request:
    branches:
      - dev

env:
  AZURE_SUBSCRIPTION: 'ado-sc'
  ENV: ${{ github.ref_name }}


jobs:
  check-bicep:
    name: Check Bicep Syntax
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: echosecret
        run: echo ${{ env.BASE_NAME }}