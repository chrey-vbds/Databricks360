name: Deploy-IAC

on:
  workflow_dispatch:

  push:
    branches:
      - dev
      - main
    paths-ignore:
      - '*'
  # pull_request:
  #   branches:
  #     - dev
  #     - main


jobs:
  deploy:
    name: check bicep
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}
      
    env:
      envname: ${{ github.ref == 'refs/heads/main' && 'prd' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: echo out variables from config file
        run: |
          echo "Environment is: ${{ env.envname }}"
          echo "Resource Group is: ${{ vars.RESOURCEGROUP }}"
