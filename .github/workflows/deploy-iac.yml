name: Deploy-IAC

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - '*'
  pull_request:
    branches:
      - dev
      - main


jobs:
  deploy:
    name: check bicep
    runs-on: ubuntu-latest
    env:
      CONFIG_FILE: ${{ github.ref == 'refs/heads/main' && './configprd.yml' || './configdev.yml' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print config file used
        run: echo "Using configuration file $CONFIG_FILE"

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Execute Azure CLI command
        run: az version