name: Run Azure Login With a Service Principal Secret

on:
    workflow_dispatch:

    push:
        branches:
            - dev

permissions:
    id-token: write
    contents: read

jobs:
  do-the-login:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4   

    - name: login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Azure CLI script
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          az account show